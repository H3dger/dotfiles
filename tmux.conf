# === 基础设置 ===
set -g prefix `           # 前缀键改为反引号 `
unbind C-b
bind ` send-prefix
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane

set -g mouse on             # 开启鼠标
set -g base-index 1         # 窗口从 1 开始编号
setw -g pane-base-index 1   # 窗格从 1 开始编号
set -g history-limit 10000  # 增加历史记录
set -g default-terminal "tmux-256color"  # use tmux terminfo explicitly
set -g renumber-windows on  # keep numbering sequential
set -g focus-events on  # let editors and shells react to focus changes
set -g status-interval 5  # refresh status hooks more frequently
set -sg terminal-overrides ",*:RGB"  # true color support
set -g set-clipboard on  # allow OSC52 clipboard integration for remote sessions
set -as terminal-features ",xterm-ghostty:clipboard"  # advertise clipboard support to tmux
set -g escape-time 0  # disable delays on escape sequences
# supposing you use catppuccin moccha
set -g @tmux-dotbar-bg "default"
set -g @tmux-dotbar-fg "#7f849c"
set -g @tmux-dotbar-fg-current "#cdd6f4"
set -g @tmux-dotbar-fg-session "#a6adc8"
set -g @tmux-dotbar-fg-prefix "#cba6f7"
set -g @tmux-dotbar-fg-activity "#89b4fa"
set -g @tmux-dotbar-fg-bell "#fab387"
set -g @tmux-dotbar-fg-accent "#89b4fa"
set -g @tmux-dotbar-status-left "#[bg=default,fg=#{?client_prefix,#cba6f7,#a6adc8}] #S #[bg=default,fg=#a6adc8]"
set -g @tmux-dotbar-bold-current-window true
# set -g pane-border-lines simple

# === 快捷键 ===
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"
unbind '"'
unbind %

# === 插件 ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-right false
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'b0o/tmux-autoreload'
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'


run '~/.config/tmux/plugins/tpm/tpm'
